		<h1>Dendrobium</h1>
			<p>Dendrobiums are a diverse genus of over 1,999 species of epiphytic orchids native to Asia, Australia, and the Pacific.
			They are described as long, slender cane-like pseudobulbs, which can be evergreen or deciduous, producing sprays of colorful flowers - like white, purple, yellow, or pink, that can last up to weeks with proper care.
			These magnificent houseplants thrive best is a bright environment, but with indirect light, high humidity, and a resting period to encourage blooming.</p>
